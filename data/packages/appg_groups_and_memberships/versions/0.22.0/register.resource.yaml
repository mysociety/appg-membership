title: APPG Register
description: APPG Register as a spreadsheet
custom:
  row_count: 941
path: register.parquet
name: register
profile: data-resource
scheme: file
format: parquet
hashing: md5
encoding: utf-8
schema:
  fields:
  - name: slug
    type: string
    description: Slugified name of the APPG
    constraints:
      unique: false
    example: abraham-accords
  - name: title
    type: string
    description: Title of the APPG
    constraints:
      unique: true
    example: Academic Staff in Universities - Cross Party Group
  - name: purpose
    type: string
    description: Purpose of the APPG
    constraints:
      unique: false
    example: ''
  - name: category
    type: string
    description: Category of the APPG
    constraints:
      unique: false
      enum:
      - ''
      - Country, Area or Region Group
      - Subject Group
    example: ''
  - name: parliament
    type: string
    description: Parliament the APPG is in
    constraints:
      unique: false
      enum:
      - ni-assembly
      - scottish-parliament
      - senedd-cy
      - senedd-en
      - uk
    example: ni-assembly
  - name: registrable_benefits
    type: string
    description: Registrable benefits of the APPG
    constraints:
      unique: false
    example: ''
  - name: source_url
    type: string
    description: URL of the APPG on the Parliament website
    constraints:
      unique: false
    example: https://aims.niassembly.gov.uk/mlas/apgdetails.aspx?&cid=1218
  - name: categories
    type: string
    description: Pipe seperated list of (mysociety added) categories for the APPG
    constraints:
      unique: false
    example: Animals & Animal Welfare
  - name: registered_contact_name
    type: string
    description: Name of the registered contact
    constraints:
      unique: false
    example: ''
  - name: registered_contact_address
    type: string
    description: Address of the registered contact
    constraints:
      unique: false
    example: ''
  - name: registered_contact_email
    type: string
    description: Email of the registered contact
    constraints:
      unique: false
    example: ''
  - name: public_enquiry_point_name
    type: string
    description: Name of the public enquiry point
    constraints:
      unique: false
    example: ''
  - name: public_enquiry_point_email
    type: string
    description: Email of the public enquiry point
    constraints:
      unique: false
    example: ''
  - name: secretariat
    type: string
    description: Name of the secretariat
    constraints:
      unique: false
    example: ''
  - name: website
    type: string
    description: URL of the APPG website
    constraints:
      unique: false
    example: None
  - name: website_status
    type: string
    description: Status of the APPG website
    constraints:
      unique: false
      enum:
      - bad_search
      - manual
      - no_search
      - register
      - search
    example: bad_search
  - name: detailed_benefits
    type: string
    description: Json dict of the benefits of the APPG
    constraints:
      unique: false
    example: '[{"Source": "ABInBev", "Value \u00a3s": "4,950", "Received": "01/10/2025",
      "Registered": "17/10/2025", "benefit_type": "Financial Benefits"}, {"Source":
      "Stonegate", "Value \u00a3s": "4,950", "Received": "02/10/2025", "Registered":
      "17/10/2025", "benefit_type": "Financial Benefits"}, {"Source": "Diageo", "Value
      \u00a3s": "4,950", "Received": "02/10/2025", "Registered": "17/10/2025", "benefit_type":
      "Financial Benefits"}, {"Source": "SIBA", "Value \u00a3s": "2,835", "Received":
      "07/11/2025", "Registered": "14/11/2025", "benefit_type": "Financial Benefits"},
      {"Source": "Molson Coors", "Value \u00a3s": "4,950", "Received": "07/11/2025",
      "Registered": "14/11/2025", "benefit_type": "Financial Benefits"}, {"Source":
      "Greene King", "Value \u00a3s": "4,950", "Received": "07/11/2025", "Registered":
      "14/11/2025", "benefit_type": "Financial Benefits"}, {"Source": "Carlsberg Britvic",
      "Value \u00a3s": "4,950", "Received": "07/11/2025", "Registered": "14/11/2025",
      "benefit_type": "Financial Benefits"}, {"Source": "Asahi", "Value \u00a3s":
      "2,200", "Received": "10/11/2025", "Registered": "14/11/2025", "benefit_type":
      "Financial Benefits"}, {"Source": "Heineken", "Value \u00a3s": "4,950", "Received":
      "02/12/2025", "Registered": "15/12/2025", "benefit_type": "Financial Benefits"}]'
  - name: date_of_most_recent_agm
    type: string
    description: Date of the most recent AGM
    constraints:
      unique: false
    example: '2024-07-23'
  - name: published_income_expenditure_statement
    type: string
    description: Published income and expenditure statement
    constraints:
      unique: false
      enum:
      - 'False'
    example: 'False'
  - name: reporting_year
    type: string
    description: Reporting year of the APPG
    constraints:
      unique: false
    example: 01 Apr to 31 Mar
  - name: next_reporting_deadline
    type: string
    description: Next reporting deadline for the APPG
    constraints:
      unique: false
    example: '2025-11-23'
